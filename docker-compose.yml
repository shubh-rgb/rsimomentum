version: "3.9"

services:

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-marketdb}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader} -d ${POSTGRES_DB:-marketdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  scanner:
    build: .
    command: python main.py
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL}
    volumes:
      - ./logs:/app/logs
    restart: always

  dashboard:
    build: .
    command: streamlit run dashboard.py --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL}
    restart: always

volumes:
  pgdata: